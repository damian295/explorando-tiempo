<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 285" role="img" aria-labelledby="title desc">
  <title id="title">Explorando por el Tiempo</title>
  <desc id="desc">Marca tipográfica con un reloj orbital inclinado</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#75e9ff"/>
      <stop offset=".48" stop-color="#b898ff"/>
      <stop offset="1" stop-color="#ffb56d"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(116 138) rotate(-16)">
    <ellipse rx="96" ry="42" fill="none" stroke="url(#g)" stroke-width="5" opacity=".85" filter="url(#glow)"/>
