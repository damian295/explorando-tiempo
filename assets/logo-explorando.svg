    <circle cx="75" cy="31" r="6" fill="#ffb56d" filter="url(#glow)"/>
    <path d="M-26-69l6-15M26-69l-6-15M63-25l15-5M63 25l15 5M26 69l-6 15M-26 69l6 15M-63 25l-15 5M-63-25l-15-5" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity=".75"/>
  </g>
  <g fill="#fff" font-family="Montserrat, Arial, sans-serif">
    <text x="229" y="93" font-size="50" font-weight="800" letter-spacing="1">EXPLORANDO</text>
    <text x="232" y="137" font-size="24" font-weight="600" letter-spacing="8">POR EL</text>
    <text x="224" y="220" font-size="88" font-weight="900" letter-spacing="-3">TIEMPO</text>
